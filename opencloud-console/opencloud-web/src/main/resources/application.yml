spring:
  application:
    name: opencloud-console
  profiles:
    active: dev

  # ─── 数据源（HikariCP）─────────────────────────────────────────
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:opencloud}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:opencloud}
    password: ${DB_PASS:opencloud123}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000         # 获取连接超时 30s
      idle-timeout: 600000              # 空闲连接回收 10min
      max-lifetime: 1800000             # 连接最大存活 30min
      connection-test-query: SELECT 1   # 连接保活验证
      pool-name: HikariCP-OpenCloud

  # ─── Redis（Lettuce）────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      database: 0
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 2
          max-wait: 5000ms
        shutdown-timeout: 5000ms

  # ─── Flyway 数据库迁移──────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true           # 首次部署基线化，跳过已有表
    baseline-version: 0
    validate-on-migrate: true           # 执行前校验 checksum，防止脚本被篡改
    out-of-order: false                 # 禁止乱序执行
    clean-disabled: true                # 禁止 flyway clean（防意外清库）
    placeholder-replacement: false      # 禁止占位符替换，避免 ${} 被误解析

  # ─── Jackson────────────────────────────────────────────────────
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false   # LocalDateTime 序列化为字符串

  # ─── 邮件（按需配置）────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.ssl.trust: "*"

  # ─── 优雅停机 ───────────────────────────────────────────────────
  lifecycle:
    timeout-per-shutdown-phase: 30s

# ─── MyBatis-Plus ───────────────────────────────────────────────
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.qoobot.opencloud
  global-config:
    banner: false
    db-config:
      logic-delete-field: deleted         # 逻辑删除字段
      logic-delete-value: 1               # 已删除标志值
      logic-not-delete-value: 0           # 未删除标志值
      id-type: assign_id                  # 雪花算法 ID（64 位 Long）
  configuration:
    map-underscore-to-camel-case: true    # 驼峰映射（create_time → createTime）
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# ─── 服务器 ────────────────────────────────────────────────────
server:
  port: 8080
  shutdown: graceful                    # 优雅停机
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 60000

# ─── Actuator（运维健康检查 & 指标）────────────────────────────
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized     # 已认证用户可见详情，未认证仅看 status
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
  info:
    env:
      enabled: true
    build:
      enabled: true

# ─── Knife4j API 文档 ───────────────────────────────────────────
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true
    enable-document-manage: true
    swagger-model-name: 实体类列表

# ─── OpenCloud 自定义配置 ─────────────────────────────────────────
opencloud:

  # JWT（与 opencloud-auth 模块的 JwtTokenProvider 共享）
  jwt:
    secret: ${JWT_SECRET:opencloud-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
    access-token-validity: ${JWT_ACCESS_TTL:7200}     # 2h
    refresh-token-validity: ${JWT_REFRESH_TTL:604800} # 7d

  # Web 全局配置
  web:
    allowed-origins: ${ALLOWED_ORIGINS:*}   # 生产环境必须指定明确域名

  # AES-256-GCM 加密密钥（云平台 AK/SK、通知渠道敏感配置）
  encrypt:
    key: ${ENCRYPT_KEY:opencloud-aes-key-must-be-32-chars!}

  # 认证配置
  auth:
    captcha-enabled: false              # 开发环境关闭验证码，生产改 true
    login-rate-max: 10                  # 同一 IP 每分钟最大登录请求数
    login-fail-max: 5                   # 连续失败触发锁定阈值
    login-fail-lock-minutes: 15         # 锁定时长（分钟）

  # Prometheus 连接（opencloud-monitor 模块使用）
  prometheus:
    url: ${PROMETHEUS_URL:http://prometheus:9090}
    connect-timeout: 5000               # 连接超时（ms）
    read-timeout: 30000                 # 读取超时（ms）

  # Grafana 集成（opencloud-monitor 模块使用）
  grafana:
    url: ${GRAFANA_URL:http://grafana:3000}
    token: ${GRAFANA_TOKEN:}
    signed-url-ttl: 3600                # 签名 URL 有效期（秒）

  # OpenStack（opencloud-cloud 模块使用，也可从数据库动态加载）
  openstack:
    auth-url: ${OS_AUTH_URL:http://controller:5000/v3}
    username: ${OS_USERNAME:admin}
    password: ${OS_PASSWORD:}
    project-name: ${OS_PROJECT:admin}
    domain-name: ${OS_DOMAIN:Default}

  # Kubernetes（opencloud-cloud 模块使用）
  kubernetes:
    config-path: ${K8S_CONFIG:~/.kube/config}
    namespace: ${K8S_NAMESPACE:default}

  # Ceph（opencloud-cloud 模块使用）
  ceph:
    mgr-url: ${CEPH_MGR_URL:http://ceph-mgr:8003}
    rgw-url: ${CEPH_RGW_URL:http://ceph-rgw:7480}
    access-key: ${CEPH_ACCESS_KEY:}
    secret-key: ${CEPH_SECRET_KEY:}

# ─── 日志 ──────────────────────────────────────────────────────
logging:
  level:
    com.qoobot.opencloud: debug
    org.springframework.security: info
    com.baomidou.mybatisplus: info
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %highlight(%-5level) [%cyan(%X{traceId})] %logger{36} - %msg%n"
