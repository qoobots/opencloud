  # --------------------------------------------------------
  # WebSocket 端点
  # --------------------------------------------------------
  /ws/alerts:
    get:
      summary: WebSocket 实时告警推送
      description: |
        WebSocket 端点，用于实时接收告警事件。
        
        **连接方式：**
        ```
        ws://{host}/ws/alerts?token={accessToken}
        ```
        
        **消息类型：**
        - `CONNECTED`: 连接成功
        - `PING`: 服务端心跳（每 30s）
        - `ALERT_FIRING`: 新告警触发
        - `ALERT_RESOLVED`: 告警解除
        
        **注意：**
        - 握手时校验 Token，无效则拒绝连接
        - 同一用户多次连接时，新连接替换旧连接
      tags:
        - WebSocket
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: JWT AccessToken
      responses:
        '101':
          description: WebSocket 连接成功
        '401':
          description: Token 无效

# ============================================================
# 权限标识汇总
# ============================================================
# 以下权限需在 opencloud-system 模块的 sys_menu 表中初始化：
#
# monitor:metrics:query          - 查询监控指标（含 Grafana）
# monitor:alert:rule:list        - 查看告警规则 / 告警记录 / 统计 / 静默列表
# monitor:alert:rule:add         - 新增告警规则 / 静默
# monitor:alert:rule:edit        - 编辑告警规则 / 启用禁用 / 停止静默
# monitor:alert:rule:delete      - 删除告警规则 / 静默
# monitor:alert:record:ack       - 确认告警记录
# monitor:notify:channel:list    - 查看通知渠道 / 通知日志
# monitor:notify:channel:add     - 新增通知渠道
# monitor:notify:channel:edit    - 编辑通知渠道 / 发送测试消息
# monitor:notify:channel:delete  - 删除通知渠道
# ============================================================
