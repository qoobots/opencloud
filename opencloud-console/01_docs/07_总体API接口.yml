openapi: 3.0.3

info:
  title: OpenCloud 控制台 API
  description: |
    OpenCloud 云计算管理平台统一 API 接口文档。

    ## 认证方式
    所有需要认证的接口需在 Header 中携带：
    ```
    Authorization: Bearer <accessToken>
    ```

    ## 统一响应格式
    ```json
    {
      "code":    0,
      "message": "操作成功",
      "data":    {}
    }
    ```

    - `code = 0`：成功
    - `code != 0`：失败，`message` 中包含错误说明

    ## 模块说明
    | 模块 | 路径前缀 | 说明 |
    |------|---------|------|
    | 认证授权 | `/auth` | 登录、登出、Token 刷新、验证码、修改密码 |
    | 系统管理 | `/api/system` | 用户、角色、菜单、部门、租户、字典、日志管理 |
    | 云平台管理 | `/api/cloud` | 集群、云主机、网络、存储、K8s 管理 |
    | 监控告警 | `/api/monitor` | 指标查询、告警规则、告警记录、静默、通知渠道 |
    | 运维管理 | `/actuator` | 健康检查、Prometheus 指标 |

  version: "1.0.0"
  contact:
    name: OpenCloud 开发团队

servers:
  - url: http://localhost:8080
    description: 开发环境
  - url: https://api.opencloud.example.com
    description: 生产环境

tags:
  # 认证授权
  - name: 认证授权
    description: 用户登录、Token 管理、验证码、密码修改
  # 系统管理
  - name: 系统管理-用户
    description: 用户增删改查、状态管理
  - name: 系统管理-角色
    description: 角色定义与权限分配
  - name: 系统管理-菜单
    description: 菜单树维护、动态路由
  - name: 系统管理-部门
    description: 部门组织架构管理
  - name: 系统管理-租户
    description: 多租户管理
  - name: 系统管理-字典
    description: 字典类型和数据管理
  - name: 系统管理-日志
    description: 操作日志、登录日志查询
  # 云平台
  - name: 云平台-集群
    description: 集群配置与连接测试
  - name: 云平台-云主机
    description: OpenStack Nova 云主机管理
  - name: 云平台-规格
    description: OpenStack 规格查询
  - name: 云平台-密钥对
    description: OpenStack 密钥对管理
  - name: 云平台-网络
    description: Neutron 网络/子网/安全组/浮动IP管理
  - name: 云平台-镜像
    description: OpenStack Glance 镜像管理
  - name: 云平台-存储
    description: Cinder 卷/快照、Ceph 对象存储管理
  - name: 云平台-K8s
    description: Kubernetes 工作负载/服务/配置/节点管理
  - name: 云平台-配额
    description: 资源配额管理
  - name: 云平台-任务
    description: 异步任务查询
  # 监控告警
  - name: 监控-指标
    description: Prometheus PromQL 查询
  - name: 监控-Grafana
    description: Grafana 面板集成
  - name: 监控-告警规则
    description: 告警规则 CRUD
  - name: 监控-告警记录
    description: 告警事件查询与确认
  - name: 监控-静默规则
    description: 告警静默管理
  - name: 监控-通知渠道
    description: 通知渠道配置
  - name: 监控-通知日志
    description: 通知发送记录查询
  # 运维管理
  - name: 运维管理
    description: Actuator 健康检查与指标

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # 通用响应
    Result:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: 操作成功
        data:
          nullable: true

    PageResult:
      type: object
      properties:
        total:
          type: integer
          example: 100
        pages:
          type: integer
          example: 10
        current:
          type: integer
          example: 1
        size:
          type: integer
          example: 10
        records:
          type: array
          items: {}

    # 认证授权
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: Admin@123
        captchaKey:
          type: string
          description: 验证码 Key
        captchaCode:
          type: string
          description: 验证码内容

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        accessTokenExpireAt:
          type: string
          format: date-time
        refreshToken:
          type: string
        refreshTokenExpireAt:
          type: string
          format: date-time
        tokenType:
          type: string
          example: Bearer
        userInfo:
          type: object
          properties:
            userId:
              type: string
            username:
              type: string
            nickname:
              type: string
            tenantId:
              type: string

    CaptchaVO:
      type: object
      properties:
        captchaKey:
          type: string
        captchaImage:
          type: string
          description: Base64 编码图片

    CurrentUserVO:
      type: object
      properties:
        userId:
          type: string
        username:
          type: string
        nickname:
          type: string
        avatar:
          type: string
        tenantId:
          type: string
        tenantName:
          type: string
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string

    # 系统管理
    UserVO:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        nickname:
          type: string
        email:
          type: string
        phone:
          type: string
        avatar:
          type: string
        deptId:
          type: integer
        deptName:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    RoleVO:
      type: object
      properties:
        id:
          type: integer
        roleName:
          type: string
        roleCode:
          type: string
        description:
          type: string
        isBuiltin:
          type: boolean
        status:
          type: string
        sort:
          type: integer

    MenuTreeVO:
      type: object
      properties:
        id:
          type: integer
        parentId:
          type: integer
        menuName:
          type: string
        menuType:
          type: integer
        path:
          type: string
        component:
          type: string
        icon:
          type: string
        permission:
          type: string
        visible:
          type: boolean
        sort:
          type: integer
        children:
          type: array
          items:
            $ref: '#/components/schemas/MenuTreeVO'

    DeptTreeVO:
      type: object
      properties:
        id:
          type: integer
        parentId:
          type: integer
        deptName:
          type: string
        leader:
          type: string
        phone:
          type: string
        sort:
          type: integer
        status:
          type: string
        children:
          type: array
          items:
            $ref: '#/components/schemas/DeptTreeVO'

    TenantVO:
      type: object
      properties:
        id:
          type: string
        tenantCode:
          type: string
        tenantName:
          type: string
        contactName:
          type: string
        contactEmail:
          type: string
        status:
          type: string
        isDefault:
          type: boolean
        expireTime:
          type: string
          format: date-time
        userCount:
          type: integer

    DictTypeVO:
      type: object
      properties:
        id:
          type: integer
        dictType:
          type: string
        dictName:
          type: string
        isSystem:
          type: boolean
        status:
          type: string

    DictDataVO:
      type: object
      properties:
        id:
          type: integer
        dictType:
          type: string
        dictLabel:
          type: string
        dictValue:
          type: string
        sort:
          type: integer
        isDefault:
          type: boolean
        status:
          type: string

    OperationLogVO:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        moduleName:
          type: string
        operationType:
          type: string
        method:
          type: string
        requestUrl:
          type: string
        status:
          type: string
        costTime:
          type: integer
        operateIp:
          type: string
        operateTime:
          type: string
          format: date-time

    LoginLogVO:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        loginIp:
          type: string
        userAgent:
          type: string
        loginTime:
          type: string
          format: date-time
        logoutTime:
          type: string
          format: date-time
        status:
          type: string
        failReason:
          type: string

    # 云平台
    ClusterVO:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        endpoint:
          type: string
        status:
          type: string
        lastCheckTime:
          type: string
          format: date-time
        errorMsg:
          type: string

    InstanceVO:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        flavor:
          type: object
        image:
          type: object
        addresses:
          type: object
        keyName:
          type: string
        createdAt:
          type: string
          format: date-time

    FlavorVO:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        vcpus:
          type: integer
        ram:
          type: integer
        disk:
          type: integer

    KeyPairVO:
      type: object
      properties:
        name:
          type: string
        fingerprint:
          type: string
        privateKey:
          type: string
        publicKey:
          type: string

    NetworkVO:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        subnets:
          type: array
          items:
            type: string

    SubnetVO:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        networkId:
          type: string
        cidr:
          type: string
        gatewayIp:
          type: string

    SecurityGroupVO:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string

    FloatingIpVO:
      type: object
      properties:
        id:
          type: string
        floatingIpAddress:
          type: string
        fixedIpAddress:
          type: string
        status:
          type: string

    ImageVO:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        visibility:
          type: string
        size:
          type: integer

    VolumeVO:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        size:
          type: integer
        volumeType:
          type: string

    SnapshotVO:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        volumeId:
          type: string
        status:
          type: string
        size:
          type: integer

    CephOverviewVO:
      type: object
      properties:
        clusterStatus:
          type: string
        totalCapacityBytes:
          type: integer
        usedCapacityBytes:
          type: integer
        usagePercent:
          type: number
        osdCount:
          type: integer
        pgCount:
          type: integer

    BucketVO:
      type: object
      properties:
        name:
          type: string
        creationDate:
          type: string
          format: date-time

    NamespaceVO:
      type: object
      properties:
        name:
          type: string
        status:
          type: string

    DeploymentVO:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        replicas:
          type: integer
        readyReplicas:
          type: integer

    PodVO:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        status:
          type: string
        nodeName:
          type: string
        ip:
          type: string

    ServiceVO:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        type:
          type: string
        clusterIP:
          type: string

    ConfigMapVO:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        data:
          type: object

    SecretVO:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        type:
          type: string

    NodeVO:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
        roles:
          type: array
          items:
            type: string

    QuotaUsageVO:
      type: object
      properties:
        tenantId:
          type: string
        openstack:
          type: object
        ceph:
          type: object
        kubernetes:
          type: object

    TaskVO:
      type: object
      properties:
        taskId:
          type: string
        type:
          type: string
        status:
          type: string
        resourceType:
          type: string
        resourceId:
          type: string
        progress:
          type: integer

    # 监控告警
    AlertRuleVO:
      type: object
      properties:
        id:
          type: integer
        ruleName:
          type: string
        description:
          type: string
        promqlExpr:
          type: string
        severity:
          type: string
        duration:
          type: string
        notifyChannelIds:
          type: array
          items:
            type: integer
        notifyOnResolve:
          type: boolean
        status:
          type: string

    AlertRecordVO:
      type: object
      properties:
        id:
          type: integer
        ruleId:
          type: integer
        ruleName:
          type: string
        alertName:
          type: string
        severity:
          type: string
        instance:
          type: string
        labels:
          type: object
        summary:
          type: string
        status:
          type: string
        firedAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time

    AlertSilenceVO:
      type: object
      properties:
        id:
          type: integer
        silenceName:
          type: string
        description:
          type: string
        matchLabels:
          type: array
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        status:
          type: string

    NotifyChannelVO:
      type: object
      properties:
        id:
          type: integer
        channelName:
          type: string
        channelType:
          type: string
        status:
          type: string

    NotifyLogVO:
      type: object
      properties:
        id:
          type: integer
        alertRecordId:
          type: integer
        channelName:
          type: string
        channelType:
          type: string
        isTest:
          type: boolean
        status:
          type: string
        errorMsg:
          type: string
        retryCount:
          type: integer
        sentAt:
          type: string
          format: date-time

    MetricsQueryVO:
      type: object
      properties:
        resultType:
          type: string
        result:
          type: array

# ============================================================
# Paths
# ============================================================

paths:

  # ============================================================
  # 认证授权（/auth）
  # ============================================================

  /auth/captcha:
    get:
      tags: [认证授权]
      summary: 获取图形验证码
      operationId: getCaptcha
      security: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'

  /auth/login:
    post:
      tags: [认证授权]
      summary: 用户登录
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Result'

  /auth/token/refresh:
    post:
      tags: [认证授权]
      summary: 刷新 Token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: 成功

  /auth/logout:
    post:
      tags: [认证授权]
      summary: 用户登出
      operationId: logout
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功

  /auth/me:
    get:
      tags: [认证授权]
      summary: 获取当前用户信息
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功

  /auth/password/change:
    post:
      tags: [认证授权]
      summary: 修改密码
      operationId: changePassword
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
                confirmPassword:
                  type: string
      responses:
        '200':
          description: 成功

  /auth/admin/force-logout/{targetUserId}:
    post:
      tags: [认证授权]
      summary: 管理员强制下线
      operationId: forceLogout
      security:
        - BearerAuth: []
      parameters:
        - name: targetUserId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功

  /auth/admin/unlock/{targetUserId}:
    post:
      tags: [认证授权]
      summary: 管理员解锁账号
      operationId: unlockAccount
      security:
        - BearerAuth: []
      parameters:
        - name: targetUserId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功

  # ============================================================
  # 系统管理 - 用户（/api/system）
  # ============================================================

  /api/system/users:
    get:
      tags: [系统管理-用户]
      summary: 用户分页列表
      operationId: listUsers
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 10
        - name: username
          in: query
          schema:
            type: string
        - name: nickname
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 成功
    post:
      tags: [系统管理-用户]
      summary: 新增用户
      operationId: addUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                nickname:
                  type: string
                password:
                  type: string
                email:
                  type: string
                phone:
                  type: string
                deptId:
                  type: integer
      responses:
        '200':
          description: 成功

  /api/system/users/{id}:
    get:
      tags: [系统管理-用户]
      summary: 用户详情
      operationId: getUser
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
    put:
      tags: [系统管理-用户]
      summary: 编辑用户
      operationId: updateUser
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: 成功
    delete:
      tags: [系统管理-用户]
      summary: 删除用户
      operationId: deleteUser
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功

  /api/system/users/{id}/status:
    put:
      tags: [系统管理-用户]
      summary: 启用/禁用用户
      operationId: updateUserStatus
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
      responses:
        '200':
          description: 成功

  /api/system/users/{id}/roles:
    put:
      tags: [系统管理-用户]
      summary: 分配用户角色
      operationId: assignUserRoles
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                roleIds:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: 成功

  /api/system/users/{id}/password:
    put:
      tags: [系统管理-用户]
      summary: 重置用户密码
      operationId: resetUserPassword
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功

  # ============================================================
  # 系统管理 - 角色
  # ============================================================

  /api/system/roles:
    get:
      tags: [系统管理-角色]
      summary: 角色列表
      operationId: listRoles
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
    post:
      tags: [系统管理-角色]
      summary: 新增角色
      operationId: addRole
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
